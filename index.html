<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Fitness Viewer v3.83</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F5E4C4; --bg2:#efdcb6; --card:#fffaf0; --line:#e0cfa6;
    --text:#2d3439; --muted:#8a7d63; --accent:#3AABA8; --accent2:#E88A0A; --thead:#fbe8c9;
    --ok:#2e9e6b; --none:#a99a7d; --miss:#cbb994; --today:#fff2da;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--text); font-family:"Meiryo","メイリオ",sans-serif; line-height:1.7; font-size:15px;}
  #gate{position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px;}
  #gate h1{font-size:18px; margin:0; font-weight:700}
  #gate p{margin:0; color:var(--muted); font-size:13px; text-align:center}
  #pin{width:184px; text-align:center; font-size:30px; letter-spacing:14px; padding:12px 0 12px 14px; border-radius:12px; border:1px solid var(--line); background:var(--card); color:var(--text); outline:none;}
  #pin:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(58,171,168,.18)}
  #gateBtn{background:var(--accent); color:#fff; border:none; font-weight:700; padding:12px 30px; border-radius:12px; font-size:15px; cursor:pointer;}
  #gateErr{color:#c0392b; font-size:13px; min-height:18px; margin:0}
  #app{display:none; max-width:none; margin:0 auto; min-height:100vh; background:var(--bg)}
  html{height:100%}
  /* 週カレンダー表示時のみ：PC/iPadはページ全体を固定し、スクロールはセル内(overflow:auto)だけに */
  @media(min-width:641px){
    body.calfix{height:100dvh; overflow:hidden}
    body.calfix #app{height:100dvh; min-height:0; overflow:hidden}
  }
  header.top{position:sticky; top:0; z-index:30; background:var(--bg); border-bottom:1px solid var(--line); padding:5px 16px 0; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .ttl{display:flex; align-items:baseline; gap:6px; flex:0 0 auto}
  .ttl b{font-size:14px}
  .ttl span{font-size:10px; color:var(--muted)}
  .tabs{display:flex; gap:4px; flex:1 1 auto; justify-content:flex-end}
  .tab{flex:0 0 auto; min-width:96px; text-align:center; padding:6px 10px; border:none; cursor:pointer; background:transparent; color:var(--muted); font-size:13px; font-weight:700; border-bottom:3px solid transparent; font-family:inherit;}
  .tab.active{color:var(--text); border-bottom-color:var(--accent)}
  .subnav{display:flex; gap:6px; margin:4px 0 12px; flex-wrap:wrap}
  .subnav button{flex:0 0 auto; padding:7px 15px; border:1px solid var(--line); background:var(--card); color:var(--muted); font-size:13px; font-weight:700; border-radius:999px; cursor:pointer; font-family:inherit}
  .subnav button.active{background:var(--accent); color:#fff; border-color:var(--accent)}
  .subhint{font-size:12px; color:var(--muted); margin:-4px 0 12px}
  .openfull{display:inline-block; margin:0 0 14px; padding:9px 15px; background:#fff7e6; border:1px solid var(--accent2); color:#7a4a08; border-radius:10px; text-decoration:none; font-size:13px; font-weight:800}
  .openfull:active{background:#ffeccc}
  #events{max-width:1080px; margin:0 auto; display:flex; flex-direction:column; gap:14px;}
  .evcard{background:var(--card); border:1px solid var(--line); border-left:6px solid var(--accent2); border-radius:14px; padding:16px 18px;}
  .evhd{display:flex; align-items:center; gap:14px; margin-bottom:6px}
  .evbadge{flex:0 0 auto; min-width:62px; text-align:center; background:var(--accent2); color:#fff; border-radius:12px; padding:8px 8px; line-height:1.12;}
  .evbadge b{display:block; font-size:26px; font-weight:800}
  .evbadge span{font-size:10px; opacity:.95}
  .evttl{font-weight:800; font-size:17px; color:var(--text)}
  .evwhen{font-size:12px; color:var(--muted); margin-top:3px}
  .evbody{font-size:13.5px}
  .evbody ul{margin:8px 0 0; padding-left:20px}
  .evbody li{margin:3px 0}
  .evbody strong{color:#b5680a}
  .evcard.is-soon{border-left-color:#d23b3b}
  .evcard.is-soon .evbadge{background:#d23b3b}
  .evcard.is-today .evbadge{background:var(--accent)}
  .evcard.is-done{opacity:.6}
  .evcard.is-done .evbadge{background:var(--none)}
  .ev-empty{color:var(--muted); text-align:center; padding:30px 0}
  .evhd .pl-now{background:var(--accent); color:#fff; font-size:11px; font-weight:800; padding:2px 9px; border-radius:9px}
  .evhd .pl-fut{background:var(--accent2); color:#fff; font-size:11px; font-weight:800; padding:2px 9px; border-radius:9px}
  .evhd .pl-pst{background:var(--none); color:#fff; font-size:11px; font-weight:700; padding:2px 9px; border-radius:9px}
  .plbody ul{margin:4px 0 0; padding-left:18px}
  .plbody li{margin:3px 0; font-size:12.5px; line-height:1.6}
  .plbody strong{color:#b5680a}
  .evplan{margin-top:14px; border-top:1px dashed var(--line); padding-top:12px}
  .evplan .pl-h{font-size:12px; color:var(--accent2); font-weight:800; margin-bottom:10px}
  .plday{border:1px solid var(--line); border-radius:11px; margin-top:8px; background:#fffdf8; overflow:hidden}
  .plday .pld-h{display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--bg2); padding:7px 12px; border-bottom:1px solid var(--line)}
  .plday .pld-t{font-weight:800; font-size:15px; color:#5a4a2e; flex:1 1 auto}
  .plday .pl-now{background:var(--accent); color:#fff; font-size:9px; font-weight:700; padding:1px 6px; border-radius:8px}
  .plday .pl-w{font-size:11px; font-weight:800; color:var(--accent); background:#eaf6f5; padding:1px 8px; border-radius:8px}
  .plday .pl-w.pl-no{color:var(--miss); background:#f3ecda}
  .plday .pld-b{padding:10px 15px 13px}
  .plday .pld-b ul{margin:0; padding-left:18px}
  .plday .pld-b li{margin:5px 0; font-size:14.5px; line-height:1.75}
  .plday .pld-b strong{color:#b5680a}
  .plday.is-today{border-color:var(--accent)}
  .plday.is-today .pld-h{background:var(--today)}
  .plday.is-past{opacity:.55}
  .plday.is-evt{border-left:5px solid var(--accent2)}
  .plday.is-evt .pld-h{background:#fff4e3} .plrow .pl-tr{flex-basis:auto} .plrow .pl-m{flex-basis:100%; order:3} }
  main{padding:12px 16px}
  @media(min-width:760px){ main{padding:12px 32px} }
  #toc{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 18px; margin-bottom:22px;}
  #toc .toc-h{font-size:12px; color:var(--accent2); font-weight:800; margin-bottom:8px}
  #toc a{display:block; color:var(--text); text-decoration:none; font-size:13px; padding:5px 0; border-bottom:1px dashed var(--line)}
  #toc a:last-child{border-bottom:none}
  .md{max-width:1080px; margin:0 auto; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px 22px}
  @media(min-width:760px){ .md{padding:28px 32px} }
  .md h1{font-size:21px; border-bottom:2px solid var(--line); padding-bottom:10px; margin:4px 0 18px}
  .md h2{font-size:17px; color:#1f7f7d; margin:28px 0 12px; border-left:4px solid var(--accent); padding-left:11px}
  .md h3{font-size:15.5px; margin:24px 0 8px; scroll-margin-top:130px; font-weight:700}
  .md blockquote{margin:14px 0; padding:10px 16px; background:var(--bg2); border-left:3px solid var(--accent2); color:var(--muted); font-size:13px; border-radius:0 10px 10px 0;}
  .md table{border-collapse:collapse; width:100%; font-size:12.5px; margin:14px 0; display:block; overflow-x:auto}
  .md th,.md td{border:1px solid var(--line); padding:7px 10px; text-align:left; white-space:nowrap}
  .md th{background:var(--thead); color:#b5680a}
  .md tr:nth-child(even) td{background:#fffdf8}
  .md hr{border:none; border-top:1px solid var(--line); margin:24px 0}
  .md ul{padding-left:21px} .md li{margin:4px 0}
  .md strong{color:#1f2a30}
  .md code{background:var(--bg2); padding:1px 6px; border-radius:6px; font-size:12px; color:#9a5a00}
  /* 週ビュー */
  .weeknav{display:flex; align-items:center; justify-content:center; gap:14px; margin:0 0 5px}
  .weeknav button{background:var(--card); border:1px solid var(--line); color:var(--text); font-size:16px; width:30px; height:30px; border-radius:9px; cursor:pointer; font-family:inherit}
  .weeknav button:active{background:var(--bg2)}
  .weeknav .wl{font-size:14px; font-weight:800; min-width:170px; text-align:center}
  .calwrap{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; overflow-x:auto; margin-bottom:8px}
  table.cal{border-collapse:collapse; width:100%; table-layout:fixed}
  table.cal th,table.cal td{border:1px solid var(--line); vertical-align:top}
  table.cal thead th{background:var(--thead); color:#7a4a08; font-size:13.5px; padding:8px 5px; text-align:center; position:sticky; top:0; line-height:1.35}
  table.cal th.sec,table.cal td.sec{width:78px; background:var(--bg2); font-weight:800; font-size:13px; text-align:center; vertical-align:middle; position:sticky; left:0; z-index:2; color:#5a4a2e}
  table.cal thead th.sec{z-index:3}
  table.cal th.today,table.cal td.today{background:var(--today)}
  table.cal thead th.today{box-shadow:inset 0 -3px 0 var(--accent2)}
  table.cal td:not(.sec):not(.wt){height:calc((100vh - 270px)/6); height:calc((100svh - 270px)/6); min-height:56px; padding:0}
  .cell{font-size:13px; line-height:1.55; padding:8px 9px; height:100%; box-sizing:border-box; overflow:auto}
  .cell blockquote{margin:6px 0 0; padding:5px 9px; border-left:3px solid #c98a2e; background:#fbf3e6; border-radius:0 7px 7px 0; font-size:11.5px; line-height:1.5; color:#5a4a2e}
  .cell blockquote p{margin:2px 0}
  .cell blockquote strong{color:#b5680a}
  .cell ul{margin:1px 0; padding-left:14px}
  .cell li{margin:1px 0}
  .cell strong{color:#1f2a30}
  .cell .empty{color:#c9b896}
  .cell .none{color:var(--none); font-weight:700}
  td.wt{font-size:14px; font-weight:800; text-align:center; vertical-align:middle; color:#1f2a30; padding:6px; height:42px}
  .cc{position:relative; height:220px}
  .cc canvas{width:100%!important; height:100%!important}
  .chartbox{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 16px 8px; margin-bottom:18px}
  .chartttl{font-size:13.5px; font-weight:800; margin-bottom:8px; color:#5a4a2e}
  .updated{color:var(--muted); font-size:10px; text-align:right; margin-top:6px}
  @media(max-width:640px){
    header.top{gap:8px}
    .tab{min-width:auto; padding:6px 7px; font-size:12px}
    main{padding:8px}
    .weeknav .wl{min-width:120px; font-size:13px}
    table.cal{min-width:1080px}
    table.cal th.sec,table.cal td.sec{width:52px; font-size:11px}
    table.cal thead th{font-size:11.5px; padding:6px 3px}
    table.cal td:not(.sec):not(.wt){height:auto; min-height:0}
    .cell{height:auto; overflow:visible; font-size:11.5px; line-height:1.5; padding:6px 7px}
    .cell blockquote{font-size:10.5px; padding:4px 7px}
    .calwrap{-webkit-overflow-scrolling:touch}
  }
  /* ---- スマホ(<=640px) 週表示：日付ごと縦リスト／日付ヘッダを上部固定／各行にセクション名を併記 ---- */
  @media(max-width:640px){
    body.calfix{height:100dvh; overflow:hidden}
    body.calfix #app{height:100dvh; min-height:0; overflow:hidden; display:flex !important; flex-direction:column}
    body.calfix header.top{flex:0 0 auto}
    body.calfix main{flex:1 1 auto; min-height:0; display:flex; flex-direction:column; overflow:hidden; padding:8px}
    body.calfix #content{flex:1 1 auto; min-height:0; display:flex; flex-direction:column; overflow:hidden}
    body.calfix .weeknav{flex:0 0 auto; margin-bottom:6px}
    body.calfix .updated{display:none}
    .mlist{flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-right:2px}
    .mday{margin-bottom:14px; border:1px solid var(--line); border-radius:12px; background:var(--card)}
    .mday.tday{border-color:var(--accent2); box-shadow:0 0 0 1px var(--accent2)}
    .mdate{position:sticky; top:0; z-index:5; background:var(--thead); color:#7a4a08; font-weight:800; font-size:14px; padding:8px 12px; border-bottom:1px solid var(--line); border-radius:11px 11px 0 0}
    .mday.tday .mdate{background:#ffe6c2}
    .mdate .tbadge{background:var(--accent2); color:#fff; font-size:10px; font-weight:700; padding:1px 7px; border-radius:10px; margin-left:8px; vertical-align:middle}
    .mrow{display:flex; align-items:stretch; border-top:1px solid var(--line)}
    .msec{flex:0 0 64px; background:var(--bg2); color:#5a4a2e; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; text-align:center; padding:6px 4px; border-right:1px solid var(--line)}
    .mcell{flex:1 1 auto; min-width:0}
    .mwt{display:flex; align-items:center; font-weight:800; color:var(--accent); font-size:15px}
    .mempty{padding:24px 12px; color:var(--muted); text-align:center}
  }
  .timetag{display:inline-block;font-size:9px;line-height:1.5;background:var(--accent);color:#fff;padding:0 5px;border-radius:7px;margin:0 0 3px 0;font-weight:700;white-space:nowrap;letter-spacing:.02em}
  #rvModal{position:fixed;inset:0;background:rgba(31,42,48,.55);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:36px 14px;overflow:auto}
  #rvModal.show{display:flex}
  .rvcard{background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:920px;width:100%;padding:8px 20px 22px;position:relative;box-shadow:0 12px 44px rgba(0,0,0,.28)}
  #rvClose{position:absolute;top:6px;right:10px;border:0;background:transparent;font-size:26px;line-height:1;color:var(--muted);cursor:pointer}
  .rvcard .md h2{font-size:16px;color:#fff;background:var(--accent);padding:7px 12px;border-radius:8px;margin:14px 34px 12px 0}
  .rvcard .md h3{font-size:14px;margin:14px 0 6px;padding-left:9px;border-left:4px solid var(--accent2)}
  .rvcard .md ul{margin:5px 0 9px;padding-left:20px}
  .rvcard .md li{margin:3px 0}
  .rvcard .md hr{border:0;border-top:1px solid var(--line);margin:14px 0}
  .rvcard .md strong{color:var(--text)}
  /* iPad/PC：日別モーダルを大きく・文字も読みやすく */
  @media(min-width:700px){
    /* 横幅は画面いっぱい・文字はカレンダーセルと同じ13px */
    #rvModal{padding:24px 12px}
    .rvcard{max-width:98vw;padding:14px 40px 34px}
    .rvcard .md h2{font-size:16px;padding:7px 12px}
    .rvcard .md h3{font-size:14px}
    .rvcard .md li,.rvcard .md p{font-size:13px;line-height:1.6}
  }
  @media(min-width:1100px){
    #rvModal{padding:28px 16px}
    .rvcard{max-width:98vw;padding:18px 56px 40px}
    .rvcard .md h2{font-size:16px}
    .rvcard .md h3{font-size:14px}
    .rvcard .md li,.rvcard .md p{font-size:13px;line-height:1.6}
  }
  .dhead{cursor:pointer}
  th.dhead:hover{text-decoration:underline}
  .mdate.dhead::after{content:" ▾";font-size:11px;color:var(--accent)}
</style>
</head>

<script>
(function(){
  var PIN="0000";
  var gate=document.getElementById('gate'),app=document.getElementById('app');
  var pin=document.getElementById('pin'),err=document.getElementById('gateErr');
  function unlock(){ gate.style.display='none'; app.style.display='block'; try{localStorage.setItem('fv_ok','1')}catch(e){} render('week'); }
  function renderPlansTab(){
    // log.md の各日「### 予定...」ブロックを拾い、立てた日だけ新しい順にカード表示
    var today=new Date(); today.setHours(0,0,0,0);
    var wdn=['日','月','火','水','木','金','土'];
    var days=srcLog.split(/\n##\s*▼\s*/).slice(1);
    var cards=[];
    days.forEach(function(b){
      var head=b.split('\n')[0].trim();
      var dm=head.match(/(\d{1,2})\/(\d{1,2})/); if(!dm) return;
      // 「### 予定...」セクションを抽出（次の ### まで）
      var m=b.match(/###\s*予定[^\n]*\n([\s\S]*?)(?=\n###\s|\n---|$)/);
      if(!m) return;                       // 予定が無い日はカード化しない
      var body=m[1].trim();
      if(!body) return;
      var mo=+dm[1], da=+dm[2];
      var y=2026; var d=new Date(y,mo-1,da); d.setHours(0,0,0,0);
      var diff=Math.round((d-today)/86400000);
      var tag = diff===0?'<span class="pl-now">今日</span>' : diff>0?('<span class="pl-fut">'+diff+'日後</span>') : '<span class="pl-pst">済</span>';
      var cls='evcard'+(diff===0?' is-today':diff<0?' is-done':'');
      var title=mo+'/'+da+'（'+wdn[d.getDay()]+'）'+head.replace(/^\d{1,2}\/\d{1,2}[（(][^）)]*[）)]?/,'').trim();
      cards.push({d:d, diff:diff, html:
        '<div class="'+cls+'"><div class="evhd"><div class="evttl">'+title+'</div>'+tag+'</div>'+
        '<div class="evbody plbody">'+marked.parse(body)+'</div></div>'});
    });
    cards.sort(function(a,b){ return b.d-a.d; });   // 新しい日が上
    content.className='';
    content.innerHTML='<div id="events">'+
      (cards.length?cards.map(function(c){return c.html;}).join(''):'<div class="ev-empty">予定はまだありません。立てた日だけここに表示されます。</div>')+
      '</div>';
    toc.style.display='none'; window.scrollTo(0,0);
  }

  function renderEventsTab(){
    // log から日付→体重 マップ
    var wmap={};
    srcLog.split(/\n##\s*▼\s*/).slice(1).forEach(function(b){
      var head=b.split('\n')[0];
      var dm=head.match(/(\d{1,2})\/(\d{1,2})/); if(!dm) return;
      var key=(+dm[1])+'-'+(+dm[2]);
      var ws=b.split(/###\s*体重/)[1];
      if(ws){ var wm=ws.match(/(\d{2,3}(?:\.\d)?)\s*kg/); if(wm) wmap[key]=wm[1]; }
    });
    var blocks=srcEvents.split(/\n##\s+/).slice(1);
    var today=new Date(); today.setHours(0,0,0,0);
    var wdn=['日','月','火','水','木','金','土'];
    var items=[];
    blocks.forEach(function(b){
      var title=b.split('\n')[0].trim();
      var md=b.match(/date:\s*(\d{4})-(\d{2})-(\d{2})/); if(!md) return;
      var d=new Date(+md[1], +md[2]-1, +md[3]); d.setHours(0,0,0,0);
      var st=(b.match(/status:\s*(\w+)/)||[])[1]||'open';
      var tm=(b.match(/time:\s*([0-9:]+)/)||[])[1]||'';
      var days=Math.round((d-today)/86400000);
      // 「### 日別プラン」で 上部本文 と 日別 を分離
      var split=b.split(/###\s*日別プラン[^\n]*\n/);
      var topRaw=split[0];
      var topBody=topRaw.split('\n').slice(1).filter(function(l){ return !/^\s*<!--/.test(l); }).join('\n').trim();
      var dayBlocks=[];
      if(split[1]){
        split[1].split(/####\s+/).slice(1).forEach(function(db){
          var lines=db.split('\n');
          var hm=lines[0].match(/(\d{4})-(\d{2})-(\d{2})/); if(!hm) return;
          var dd=new Date(+hm[1],+hm[2]-1,+hm[3]); dd.setHours(0,0,0,0);
          var label=lines[0].trim();
          var dbody=lines.slice(1).join('\n').trim();
          dayBlocks.push({date:dd, label:label, body:dbody});
        });
      }
      items.push({title:title,date:d,status:st,time:tm,days:days,top:topBody,days_:dayBlocks});
    });
    items.sort(function(a,b){ var ao=a.status==='done'?1:0,bo=b.status==='done'?1:0; if(ao!==bo)return ao-bo; return a.date-b.date; });

    var html2=items.map(function(x){
      var cls='evcard', big, mdLabel=(x.date.getMonth()+1)+'/'+x.date.getDate(), wd=wdn[x.date.getDay()];
      var done=(x.status==='done');
      if(done){ big='<b>済</b>'; cls+=' is-done'; }
      else if(x.days>0){ big='<b>'+x.days+'</b><span>日後</span>'; if(x.days<=3) cls+=' is-soon'; }
      else if(x.days===0){ big='<b>本日</b>'; cls+=' is-today'; }
      else { big='<b>終了</b>'; cls+=' is-done'; }
      var when=mdLabel+'（'+wd+'）'+(x.time?(' '+x.time):'');
      var sub = done?('目標日 '+when+'（完了）') : x.days>0?('目標日 '+when+' まで あと'+x.days+'日') : x.days===0?('目標日 '+when+'（今日）') : ('目標日 '+when+' は過ぎました');

      // 日別の詳細カード
      var planHtml='';
      if(x.days_.length){
        var rows=x.days_.map(function(p){
          var pdays=Math.round((p.date-today)/86400000);
          var rc='plday', mark='';
          if(pdays<0) rc+=' is-past';
          else if(pdays===0){ rc+=' is-today'; mark='<span class="pl-now">今日</span>'; }
          if(p.date-x.date===0) rc+=' is-evt';
          var key=(p.date.getMonth()+1)+'-'+p.date.getDate();
          var w=wmap[key];
          var wlabel = w?('<span class="pl-w">体重 '+w+'kg</span>'):'<span class="pl-w pl-no">体重 —</span>';
          // ラベルの日付以降のタイトル部分（YYYY-MM-DDを除く見やすい形）
          var ttl=p.label.replace(/^\d{4}-\d{2}-\d{2}\s*/,'');
          if(!/\d+\/\d+/.test(ttl)) ttl=(p.date.getMonth()+1)+'/'+p.date.getDate()+'（'+wdn[p.date.getDay()]+'） '+ttl;
          return '<div class="'+rc+'"><div class="pld-h"><span class="pld-t">'+ttl+'</span>'+mark+wlabel+'</div>'+
                 '<div class="pld-b">'+marked.parse(p.body)+'</div></div>';
        }).join('');
        planHtml='<div class="evplan"><div class="pl-h">当日までの日別プラン（体重は記録が入った日に自動表示）</div>'+rows+'</div>';
      }
      return '<div class="'+cls+'"><div class="evhd"><div class="evbadge">'+big+'</div>'+
             '<div><div class="evttl">'+x.title+'</div><div class="evwhen">'+sub+'</div></div></div>'+
             (x.top?('<div class="evbody">'+marked.parse(x.top)+'</div>'):'')+planHtml+'</div>';
    }).join('');
    content.className=''; content.innerHTML='<div id="events">'+(html2||'<div class="ev-empty">イベントはありません</div>')+'</div>';
    toc.style.display='none'; window.scrollTo(0,0);
  }
  function tryPin(){ if(pin.value===PIN){unlock();} else {err.textContent='PINが違います'; pin.value=''; pin.focus();} }
  document.getElementById('gateBtn').onclick=tryPin;
  pin.addEventListener('keyup',function(e){ if(pin.value.length===4 && pin.value===PIN){unlock();} if(e.key==='Enter') tryPin(); });
  try{ if(localStorage.getItem('fv_ok')!=='1'){ pin.focus(); } }catch(e){ pin.focus(); }

  /* v3.83 データ分離ローダー：data/*.md を同期取得して埋め込みスロットへ注入（失敗時はスロット内フォールバック文言を表示） */
  (function(){
    var FV_DATA={'src-log':'data/log.md','src-insights':'data/insights.md','src-review':'data/review.md','src-events':'data/events.md','src-references':'data/references.md','src-core':'data/core.md'};
    for(var fvId in FV_DATA){
      try{
        var fvX=new XMLHttpRequest();
        fvX.open('GET',FV_DATA[fvId]+'?t='+Date.now(),false);
        fvX.send(null);
        if(fvX.status===200&&fvX.responseText){document.getElementById(fvId).textContent=fvX.responseText;}
      }catch(fvE){}
    }
  })();
  var srcLog=document.getElementById('src-log').textContent;
  var srcIns=document.getElementById('src-insights').textContent;
  var srcReview=document.getElementById('src-review').textContent;
  var srcEvents=document.getElementById('src-events').textContent;
  var srcRef=document.getElementById('src-references').textContent;
  var srcCore=document.getElementById('src-core').textContent;
  var content=document.getElementById('content'), toc=document.getElementById('toc');
  marked.setOptions({gfm:true, breaks:false});
  var SECTIONS=['朝トレ','朝食','昼食','夕トレ','夕食','夜トレ'];
  var WD=['月','火','水','木','金','土','日'];

  function parseDays(md){
    var re=/##\s*▼\s*([^\n]+)/g, m, marks=[];
    while((m=re.exec(md))){ marks.push({label:m[1].trim(), idx:m.index}); }
    var days=[];
    for(var i=0;i<marks.length;i++){
      var end=(i+1<marks.length)?marks[i+1].idx:md.length;
      days.push({label:marks[i].label, text:md.slice(marks[i].idx,end)});
    }
    return days;
  }
  function blocksOf(t){
    var map={},cur=null,buf=[];var ls=t.split('\n');
    for(var i=0;i<ls.length;i++){var line=ls[i];var hm=line.match(/^###\s+(.+?)\s*$/);
      if(hm){if(cur!==null)map[cur]=buf.join('\n').trim();cur=hm[1].trim();buf=[];}
      else if(cur!==null){if(/^##\s/.test(line)||/^---\s*$/.test(line)){map[cur]=buf.join('\n').trim();cur=null;buf=[];}else buf.push(line);}}
    if(cur!==null)map[cur]=buf.join('\n').trim();
    return map;
  }
  function dateOf(label){
    var m=label.match(/(\d{1,2})\/(\d{1,2})/); if(!m)return null;
    var mo=+m[1],da=+m[2]; var now=new Date(); var y=now.getFullYear();
    if(mo-(now.getMonth()+1)>6) y=y-1;
    return new Date(y,mo-1,da);
  }
  function ymd(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
  function mondayOf(d){var x=new Date(d);var wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
  function weightVal(c){ if(!c)return null;
    var m=c.match(/夜\s*\*?\*?\s*(\d{2,3}(?:\.\d)?)\s*kg/); if(m)return parseFloat(m[1]);
    var m2=c.match(/(\d{2,3}(?:\.\d)?)\s*kg/); return m2?parseFloat(m2[1]):null; }

  // 解析（1回）
  var ENTRIES={}; // ymd -> {blocks, label, date}
  parseDays(srcLog).forEach(function(d){
    var dt=dateOf(d.label); if(!dt)return;
    ENTRIES[ymd(dt)]={blocks:blocksOf(d.text), label:d.label, date:dt};
  });
  var REVIEWS={};
  parseDays(srcReview).forEach(function(d){ var dt=dateOf(d.label); if(dt) REVIEWS[ymd(dt)]=d.text; });
  function openReview(key){
    var md=REVIEWS[key];
    document.getElementById('rvBody').innerHTML = md ? marked.parse(md) : '<p style="color:#8a7d63;margin:18px 0">この日の総評はまだありません</p>';
    document.getElementById('rvModal').classList.add('show');
  }
  function closeReview(){ document.getElementById('rvModal').classList.remove('show'); }
  content.addEventListener('click', function(ev){ var t=ev.target.closest?ev.target.closest('[data-d]'):null; if(t){ openReview(t.getAttribute('data-d')); } });
  document.getElementById('rvClose').addEventListener('click', closeReview);
  document.getElementById('rvModal').addEventListener('click', function(ev){ if(ev.target.id==='rvModal') closeReview(); });
  document.addEventListener('keydown', function(ev){ if(ev.key==='Escape') closeReview(); });

  var curMon = mondayOf(new Date());

  function cellHtml(content){
    if(content===null||content===undefined||content==='') return '<span class="empty">·</span>';
    var plain=content.replace(/[-*\s　・]/g,'');
    if(plain.indexOf('なし')===0) return '<span class="none">－ なし</span>';
    var tmp=document.createElement('div');
    tmp.innerHTML=marked.parse(content);
    function esc(t){var d=document.createElement('span');d.textContent=t;return d.innerHTML;}
    Array.prototype.forEach.call(tmp.querySelectorAll('table'),function(tb){
      var ul=document.createElement('ul');
      Array.prototype.forEach.call(tb.querySelectorAll('tbody tr'),function(tr){
        var c=Array.prototype.map.call(tr.querySelectorAll('td'),function(e){return e.textContent.trim();});
        if(!c.length||c.join('')==='') return;
        var name=c[0]||'', part=(c.length>=3?c[1]:''), rest=(c.length>=3?c.slice(2).join(' / '):c.slice(1).join(' / '));
        var li=document.createElement('li');
        li.innerHTML='<strong>'+esc(name)+'</strong>'+(part?'（'+esc(part)+'）':'')+(rest?'：'+esc(rest):'');
        ul.appendChild(li);
      });
      if(ul.children.length){tb.parentNode.replaceChild(ul,tb);}else{tb.parentNode.removeChild(tb);}
    });
    var tagHtml='';
    var lis=tmp.querySelectorAll('li');
    for(var k=0;k<lis.length;k++){
      var mt=lis[k].textContent.trim().match(/^時間\s+(.+)$/);
      if(mt){ tagHtml='<span class="timetag">'+esc(mt[1].trim())+'</span>'; var ulp=lis[k].parentNode; ulp.removeChild(lis[k]); if(ulp&&ulp.tagName==='UL'&&!ulp.children.length){ulp.parentNode.removeChild(ulp);} break; }
    }
    return tagHtml+tmp.innerHTML;
  }

  function renderCalendar(){
    var today=new Date(); var tkey=ymd(today);
    var days=[]; for(var i=0;i<7;i++){var dt=new Date(curMon);dt.setDate(dt.getDate()+i);days.push(dt);}
    // header
    var head='<th class="sec">　</th>';
    days.forEach(function(dt,i){
      var cls=(ymd(dt)===tkey)?' today':'';
      head+='<th class="dhead '+cls.trim()+'" data-d="'+ymd(dt)+'">'+WD[i]+'<br>'+(dt.getMonth()+1)+'/'+dt.getDate()+'</th>';
    });
    // body
    var rows='';
    SECTIONS.forEach(function(sec){
      var tds='<td class="sec">'+sec+'</td>';
      days.forEach(function(dt){
        var e=ENTRIES[ymd(dt)]; var c=e?e.blocks[sec]:null;
        var cls=(ymd(dt)===tkey)?' today':'';
        tds+='<td class="'+cls.trim()+'"><div class="cell">'+cellHtml(c==null?'':c)+'</div></td>';
      });
      rows+='<tr>'+tds+'</tr>';
    });
    // 体重行
    var wtds='<td class="sec">体重</td>';
    days.forEach(function(dt){
      var e=ENTRIES[ymd(dt)]; var w=e?weightVal(e.blocks['体重']):null;
      var cls=(ymd(dt)===tkey)?' today':'';
      wtds+='<td class="wt'+cls+'">'+(w!=null?w:'<span class="empty" style="font-weight:400">·</span>')+'</td>';
    });
    rows+='<tr>'+wtds+'</tr>';

    var ws=new Date(curMon), we=new Date(curMon); we.setDate(we.getDate()+6);
    var wl=(ws.getMonth()+1)+'/'+ws.getDate()+' 〜 '+(we.getMonth()+1)+'/'+we.getDate();

    return ''+
    '<div class="weeknav"><button id="prevW">◀</button><span class="wl">'+wl+'</span><button id="nextW">▶</button></div>'+
    '<div class="calwrap"><table class="cal"><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  function renderMobile(){
    var today=new Date(), tkey=ymd(today);
    var ws=new Date(curMon), we=new Date(curMon); we.setDate(we.getDate()+6);
    var wl=(ws.getMonth()+1)+'/'+ws.getDate()+' 〜 '+(we.getMonth()+1)+'/'+we.getDate();
    var html='<div class="weeknav"><button id="prevW">◀</button><span class="wl">'+wl+'</span><button id="nextW">▶</button></div>';
    html+='<div class="mlist">';
    var any=false;
    for(var i=6;i>=0;i--){
      var dt=new Date(curMon); dt.setDate(dt.getDate()+i);
      var e=ENTRIES[ymd(dt)]; if(!e) continue; any=true;
      var isT=(ymd(dt)===tkey);
      html+='<section'+(isT?' id="mtoday"':'')+' class="mday'+(isT?' tday':'')+'">';
      html+='<div class="mdate dhead" data-d="'+ymd(dt)+'">'+(dt.getMonth()+1)+'/'+dt.getDate()+'（'+WD[i]+'）'+(isT?'<span class="tbadge">今日</span>':'')+'</div>';
      SECTIONS.forEach(function(sec){
        var c=e.blocks[sec];
        html+='<div class="mrow"><div class="msec">'+sec+'</div><div class="cell mcell">'+cellHtml(c==null?'':c)+'</div></div>';
      });
      var w=weightVal(e.blocks['体重']);
      html+='<div class="mrow"><div class="msec">体重</div><div class="cell mcell mwt">'+(w!=null?w+' kg':'<span class="empty">·</span>')+'</div></div>';
      html+='</section>';
    }
    if(!any) html+='<p class="mempty">この週の記録はありません</p>';
    html+='</div>';
    return html;
  }

  function renderChartsPage(){
    toc.style.display='none'; content.className='';
    content.innerHTML=''+
      '<div class="chartbox"><div class="chartttl">体重推移（夜kg・目標72kg）</div><div class="cc" style="height:300px"><canvas id="wchart"></canvas></div></div>'+
      '<div class="chartbox"><div class="chartttl">週次トレ回数（朝・夕・夜トレの実施数）</div><div class="cc" style="height:260px"><canvas id="tchart"></canvas></div></div>';
    drawCharts(); window.scrollTo(0,0);
  }
  var wChart=null, tChart=null;
  function drawCharts(){
    // 体重：日付昇順で体重がある日
    var pts=Object.keys(ENTRIES).map(function(k){return ENTRIES[k];})
      .filter(function(e){return weightVal(e.blocks['体重'])!=null;})
      .sort(function(a,b){return a.date-b.date;});
    var wl=pts.map(function(e){return (e.date.getMonth()+1)+'/'+e.date.getDate();});
    var wv=pts.map(function(e){return weightVal(e.blocks['体重']);});
    if(wChart)wChart.destroy();
    var wc=document.getElementById('wchart');
    if(wc){ wChart=new Chart(wc,{type:'line',
      data:{labels:wl,datasets:[
        {label:'夜体重',data:wv,borderColor:'#E88A0A',backgroundColor:'rgba(232,138,10,.12)',tension:.3,fill:true,pointRadius:4},
        {label:'目標72kg',data:wl.map(function(){return 72;}),borderColor:'#3AABA8',borderDash:[6,4],pointRadius:0,fill:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},color:'#5a4a2e'}}},
        scales:{y:{suggestedMin:70,suggestedMax:76,ticks:{color:'#8a7d63',font:{size:11}},grid:{color:'#eaddc0'}},
                x:{ticks:{color:'#8a7d63',font:{size:11}},grid:{display:false}}}}});
    }
    // 週次トレ回数
    var weekMap={};
    Object.keys(ENTRIES).forEach(function(k){
      var e=ENTRIES[k]; var mk=ymd(mondayOf(e.date));
      var cnt=0; ['朝トレ','夕トレ','夜トレ'].forEach(function(s){
        var c=e.blocks[s]; if(c){var p=c.replace(/[-*\s　・]/g,''); if(p!==''&&p.indexOf('なし')!==0) cnt++;}
      });
      weekMap[mk]=(weekMap[mk]||0)+cnt;
    });
    var weeks=Object.keys(weekMap).map(function(k){return {k:k,d:new Date(k),v:weekMap[k]};}).sort(function(a,b){return a.d-b.d;});
    var tl=weeks.map(function(w){return (w.d.getMonth()+1)+'/'+w.d.getDate()+'週';});
    var tv=weeks.map(function(w){return w.v;});
    if(tChart)tChart.destroy();
    var tc=document.getElementById('tchart');
    if(tc){ tChart=new Chart(tc,{type:'bar',
      data:{labels:tl,datasets:[{label:'トレ回数',data:tv,backgroundColor:'#3AABA8'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:'#8a7d63',font:{size:11}},grid:{color:'#eaddc0'}},
                x:{ticks:{color:'#8a7d63',font:{size:11}},grid:{display:false}}}}});
    }
  }

  function bindNav(){
    var p=document.getElementById('prevW'),n=document.getElementById('nextW');
    if(p)p.onclick=function(){curMon.setDate(curMon.getDate()-7);renderWeek();};
    if(n)n.onclick=function(){curMon.setDate(curMon.getDate()+7);renderWeek();};
  }
  function renderWeek(){
    toc.style.display='none'; content.className='';
    var mob=window.innerWidth<=640;
    content.innerHTML=(mob?renderMobile():renderCalendar());
    bindNav(); window.scrollTo(0,0);
    if(mob){
      var tc=document.getElementById('mtoday'), ml=content.querySelector('.mlist');
      if(tc&&ml){ ml.scrollTop = tc.getBoundingClientRect().top - ml.getBoundingClientRect().top + ml.scrollTop; }
    }
  }
  function renderMd(which){
    var md=which==='log'?srcLog:srcIns; content.className='md'; content.innerHTML=marked.parse(md);
    toc.innerHTML='';
    if(which==='insights'){var hs=content.querySelectorAll('h3');
      if(hs.length){var html='<div class="toc-h">目次（タップで移動）</div>';
        hs.forEach(function(h,i){var id='q'+i;h.id=id;html+='<a href="#'+id+'">'+h.textContent+'</a>';});
        toc.innerHTML=html;toc.style.display='block';}}
    else toc.style.display='none';
    window.scrollTo(0,0);
  }
  var KSUB='insights';
  var KMETA={insights:{label:'学び', src:function(){return srcIns;}, toc:'h3', hint:'運用で確立した日付非依存のQ&A（insights.md）'},
             references:{label:'ターザンメモ', src:function(){return srcRef;}, toc:'h2', hint:'食事・栄養リファレンス（references.md ／ R1〜R8）'},
             core:{label:'ベース設定', src:function(){return srcCore;}, toc:'h2', hint:'基本情報・目標・サプリ・トレ設計の個人登録（core.md）'}};
  function renderKnowledge(sub){
    if(!KMETA[sub]) sub='insights';
    KSUB=sub; content.className='md'; toc.style.display='none';
    var nav='<div class="subnav">';
    ['insights','references','core'].forEach(function(k){ nav+='<button data-k="'+k+'"'+(k===sub?' class="active"':'')+'>'+KMETA[k].label+'</button>'; });
    nav+='</div>';
    var openf = sub==='references' ? '<a class="openfull" href="references.html">図表つきフルページを開く →</a>' : '';
    content.innerHTML = nav + '<div class="subhint">'+KMETA[sub].hint+'</div>' + openf + '<div class="kbody">'+marked.parse(KMETA[sub].src())+'</div>';
    Array.prototype.forEach.call(content.querySelectorAll('.subnav button'),function(b){ b.onclick=function(){ renderKnowledge(b.getAttribute('data-k')); }; });
    var hs=content.querySelectorAll('.kbody '+KMETA[sub].toc);
    if(hs.length){ var h2='<div class="toc-h">目次（タップで移動）</div>';
      Array.prototype.forEach.call(hs,function(h,i){ var id='k'+i; h.id=id; h2+='<a href="#'+id+'">'+h.textContent+'</a>'; });
      toc.innerHTML=h2; toc.style.display='block'; }
    window.scrollTo(0,0);
  }
  function render(which){ document.body.classList.toggle('calfix', which==='week'); if(which==='week')renderWeek(); else if(which==='charts')renderChartsPage(); else if(which==='events')renderEventsTab(); else if(which==='insights')renderKnowledge(KSUB); else renderMd(which); }
  var _rzt; window.addEventListener('resize',function(){ clearTimeout(_rzt); _rzt=setTimeout(function(){ if(document.body.classList.contains('calfix')) renderWeek(); },200); });
  document.querySelectorAll('.tab').forEach(function(b){
    b.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});b.classList.add('active');render(b.dataset.t);};
  });
  document.getElementById('built').textContent='ページ生成: '+new Date('2026-06-21T14:48:29Z').toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+' JST';
  // 全初期化後に自動アンロック＆初回描画（初期化順バグ対策）
  try{ if(localStorage.getItem('fv_ok')==='1'){ unlock(); } }catch(e){}
})();
