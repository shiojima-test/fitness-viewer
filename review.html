## ▼ 06/28（日）脚の日・自己ベスト更新／カット集中ウィンドウ初日（朝ジム28セット＋夜ベンチ）

### 食事総評（88/100）
- **タンパク質：約165〜170g / 150g（達成 ✅・上振れ）**。朝食35（蒸し鶏＋もち麦昆布おにぎり）＋朝トレ後ティゴラ26.4＋昼前チップス1袋20.6＋昼58（鶏むねサラダ＋アマニ油ドレ＋ミルクプロテイン脂肪0＋カニカマ）＋夕（冷やし中華＋サラダチキン多め＋枝豆）目安25〜30＋夜トレ後アシッド20。就寝前は充足のため無し。
- 良かった点：①昼にミルクプロテイン脂肪0（P30・脂0）でPを厚く積み低脂質を維持。②ドレッシングをアマニ油（オメガ3）にしてマヨを回避＝脂質の"質"を確保（R5/条32）。③冷やし中華を具(サラダチキン)先・麺後＝カーボラスト。④カロリミットを最こってり食(冷やし中華)に的中。⑤午後はガム・炭酸水で間食を制御。
- 弱点/留意：①本日塩分8〜9gとやや高め（昼サラダ2.7＋カニカマ1.2が主因＋夕の麺）。28セット＋発汗でNa許容は広く、翌日水分で戻す。②昼に物足りなさ＝減量期の昼が軽すぎる兆候。続くなら昼のボリューム（低カロリーで満たす副菜）を一段上げる。

### トレ総評（92/100）
- 雨でランなし→朝ジムで脚の日として大ボリューム（**計28セット**：胸6・脚7・背中9・肩6）。
- **自己ベスト更新が複数**：背中ラット・シーテッドローとも70kg×8×3で確立（従来63kg）、肩ショルダープレス50kg余裕→57kg×10×3へUP。グルートマシン撤去はレッグプレス殿筋狙い(93×12×3)で代替。
- 「胸はやった感が薄い／背中は筋肉痛」は効き差でなく刺激の新しさの差（背中は初挑戦重量＝未経験刺激）。**筋肉痛は成長指標ではない**。
- 夜：ダンベルベンチを"胸の日"として実施＋トレ後アシッド（明日6/29ベンチBは軽めでバランス）。
- 課題：**ダンベルベンチの実kgが未記録**＝胸の漸進管理ができていない。胸を伸ばすなら次回から実kg記録が必須。

### 体重
- **未測定**。麺の日＋食後＋夜遅で単日判定に不向き。次回は同条件（朝）で週平均に入れて追う。

### 今日のポイント（メモ）
- **高重量の初挑戦は初日に潰し切らない**：背中70kgは「きつい」(RIR0-1)で2〜3セット＋ドロップに留め、フォーム破綻・故障を回避。新重量は初回フォーム固め→次回攻める、が漸進の正道。
- **マヨ vs ドレッシングは脂質"量"だけでなく"質"で判断**：今回はアマニ油ドレ(オメガ3)が量・質とも上。ただしALA→EPA/DHA変換は男性で低く、直接DHAは青魚優先（R3）。一度「ドレッシングが軽い」と裏取りなしで断定→撤回した反省も記録。
- **物足りなさは栄養不足でなく満腹感(固形の食べ応え)不足**。ドリンクでP30取った日は固形の"食べた感"が薄い。低カロリー副菜・汁物・酢の物・噛み応えで満たすのが正解。

### 翌日への一手
- 6/29(月)はラン無し→**ジムで本気の追い込み（今週の主力）**。胸主役＋**ダンベルベンチは実kg記録**（漸進の起点）。食事は赤字だが**P150g維持**（赤字は糖質・脂質で作る）。
- 火〜水（野球・居酒屋）に備え、月でクリーンな赤字を稼ぐ。塩分は本日やや高め→明日以降水分で戻す。

## ▼ 06/27（土）ラン再開日（朝ジム＋ラン＋夜ベンチ／3本立て）

### 食事総評（85/100）
- **タンパク質：約156g / 150g（達成 ✅）**。朝36.2（チキン＋おにぎり＋ザバス）＋ラン後ティゴラ26.4＋昼約37（炒め＋ブロッコリーチキン＆エッグ20.6＋ご飯）＋夕約36（チキン南蛮＋明太春巻き＋ご飯）＋ベンチ後アシッド20.0。寝る前ティゴラは無しで上振れ最小に着地。
- **カロリー：約2,150kcal**で維持枠2,000〜2,100にほぼトントン〜わずか上。減量を強く進める日ではないが、P150g最優先の結果として合格。
- 良かった点：①夕食でラーメンでなくチキン南蛮を選びP確保＋糖質・塩分を抑えた（7/7の方向に合う）。②カロリミットを昼で使わず本日最こってり＝夜の揚げ物の食前に的中。③糖質は全体に抑制できている。
- 弱点：脂質が夕食（チキン南蛮＋春巻き）で高め。翌日を低脂質寄りにして週でならす。ビール1杯は許容範囲。

### トレ総評（80/100）
- 3本立て（朝ジム＋ラン＋夜ベンチ）を実施。前進が大きい日。
- 朝ジム：チェストプレス 50×10×3 → 57×10 と、久々でも前回working（70）に対し順調な戻り。短期デトレーニングで筋力がほぼ落ちないことと整合。
- ラン：6/19以来の再開を実行。ただし**直前の飲食で腹痛→分割**になり十分に走れず（ラン約2.5km＋ウォーク）。ペース5'26〜5'58・HR125〜146はZ2上限寄りで、再開直後はもう少しゆっくりでよい。
- 夜ベンチ：パターンB定番量を実施＋トレ後アシッド。胸が朝チェストプレスと重なる日だったが完遂。
- 課題：①ラン前の飲食タイミング（下記ポイント）。②ジム・ベンチとも重量×回数の記録が薄く、漸進検証ができない。次回から数値を残す。

### 体重
- **74.5kg（夜・夕食＋ビール＋トレ後）**。1日でいちばん重く出る条件（糖質・塩分・水分・食後）で、脂肪増ではない。単日で判断せず同条件の週平均で追う。朝（同条件）で見れば落ち着く見込み。

### 今日のポイント（メモ）
- **ラン前の直前飲食で腹痛→分割**。朝食（おにぎり＋チキン＋ザバス）がラン開始11:04に近すぎた。固形・プロテインはラン30〜60分前までに終え、直前は水分程度にとどめる。再開期の重要な運用知見（insights Q1-7／Q4-2に接続）。
- カロリミットは「1日1回・本日最こってり食の食前」。昼で使わず夜の揚げ物に回すのが正しい当て方（今日実践できた）。

### 翌日への一手
- 6/28（日）は自由トレ＆ラン日。**ラン前は固形・プロテインを30〜60分前までに終え、直前は水分のみ**（今日の腹痛の学びを実装）。
- 脚を入れるならこの日（週で唯一）。脂質は今日やや高めだったぶん低脂質寄りでならす。P150g継続。

## ▼ 06/26（金）在宅・通常運転初日（雨でラン不可）

### 食事総評（88/100）
- **タンパク質：約163g / 150g（達成 ✅・やや上振れ）**。朝で厚く積む立ち上がり（ティゴラ＋チップス分割＝朝〜午後で約47g）が効き、夕食にチャンプル＋鮭が乗って余裕を持って着地。
- 良かった点：朝に「予定」を立て、実績がほぼ計画どおり。カロリミットを本日最大食（昼チャンプル＝炒め油＋豚＋ご飯）の食前に的中。EPA・DHA／マルチを脂質のある昼に同席。
- 弱点：昼が「ゴーヤチャンプルのみ（鮭なし）」で計画よりP15g前後ダウン。ただし夕食でチャンプル＋鮭にして回収。昼・夕でチャンプル2食＝炒め油が連続し脂質はやや重め（夜は油控えめ指示済み）。
- プロテインチップス（BODY STAR／P20.6g）を保険として今日1袋使用。届かない昼を埋める間食として機能。
- 次に活かす1点：昼を「チャンプル＋魚」で固める日は鮭を省かない。省くと昼P15g欠ける。

### トレ総評（80/100）
- 朝：ストレッチ＋軽い自重（軽め）。夜：久々のベンチ（パターンB）を実施＝1日2回トレ。トレ前クアン／トレ後アシッド／就寝前ティゴラ。
- 効果：通常運転初日でベンチ（パターンB）を再開できたのは前進。出張中の自重のみ・漸進なしから一歩進んだ。
- 課題：ベンチの重量×回数が未記録のため漸進の検証ができない。次回からセット内容を残すと、ブランク明けからの戻りが追える。

### 体重
- **72.8kg（入浴・発汗後）**。6/24夜74.5kg → −1.7kg。出張の水分・グリコーゲンが抜けた通常化の動き。単日で喜びすぎず週平均で確認。8/31夜72kg目標の射程内。

### 今日のポイント（メモ）
- **プロテインチップス1袋を午前・午後に小分けにして1日かけて食べたのが良かった**。20g級を分割＝1回の吸収有効域（20〜40g）に収まり合成効率が上がる＋空腹の谷を2回ふさげる。空腹起点の在宅日にハマった。今後の定番運用にする（insights Q1-8／core.mdに登録済み）。

### 翌日への一手
- ベンチを再開できたので、次回パターンBは重量×回数を記録して漸進を一点入れる。
- ランのブランク（6/19以降）が継続。雨が上がったらZ2ランで持久の立て直しを再開。クレアチンは連日継続。

## ▼ 06/25（木）日帰り出張・昼読めない日

### 食事総評（86/100）
- **タンパク質：約150.7g / 150g（達成 ✅）**。出張明け即・日帰り＋昼が読めない難条件での達成は上出来。
- 朝に「予定」を立て、実績がほぼ計画どおりに着地（計画→実績が噛み合った日）。
- 良かった配置：読めない昼を外食（チキン南蛮）で確保→夕方コンビニで上乗せ→トレ後アシッド→寝る前ティゴラで150到達。カロリミットを本日最大食（チキン南蛮＝揚げ＋タルタル＋ご飯）の食前に的中。
- 弱点：昼のチキン南蛮の脂質は高めだが、カロリミット投下と夜の脂肪0徹底で相殺。
- 次に活かす1点：夕方の固形はP18級（サラダチキン）の方がスティック2本より効率が高い。読めない日は「P18級ドリンク＋固形1」の型に寄せると軽い。

### トレ総評（76/100）
- 帰宅後（23時台）に自重A（ワイド・ナロー・腹筋クロス）のみ。クアン未使用。トレ後アシッド→就寝前ティゴラ。
- 効果：出張中の頻度維持＋トレ後ロイシンで合成方向。ただし自重のみ・漸進なし・追加種目なしで刺激量は軽め。
- 次の一手：通常運転に戻ったらパターンB＋ブルガリアン等の高負荷を再開し、漸進を一点入れる。

### 翌日への一手
- 出張連投（6/21〜25）が終了→通常運転へ。体重は水分が抜けるまで判定保留、夜・週平均で見る。
- ランのブランクが続いているので、持久の立て直し（Z2ラン）の再開を検討。クレアチンは連日継続。

## ▼ 06/24（水）出張3日目・愛知・昼抜き日

### 食事総評（90/100）
- **タンパク質：約171.8g / 150g（達成 ✅）**。昼抜き条件での150g超は見事。
- 良かった配置：朝バイキングを本日最大食と判断しカロリミットを朝食前に投下。ひきずり鍋（鶏多め）・焼き魚・味噌煮の肉でP源を主役化、揚げ物は串カツ・エビフライ各1で抑制。夕は脂肪0ドリンク＋鶏＋魚肉で脂質約4gに徹底。
- 弱点：ほぼなし。昼抜きでも朝で約70g積む立ち上がりが効いた。

### トレ総評（85/100）
- **1日2回トレ**。朝：自重A 27:36／平均HR81（名古屋）。夜：自重A＋サイドレイズ10×5 50:39／平均HR74（甲府）。
- 効果：出張で空いた刺激を取り戻す好内容。夜にサイドレイズで肩も追加。クレアチン再開＋寝る前ティゴラで再飽和と夜間合成を確保。
- 次の一手：自重中心なので、通常復帰後は高負荷（パターンB）に戻して漸進を再開。

### 翌日への一手
- 出張明け即・日帰り出張。昼読めない×夜コンビニ。朝に「予定」を立てて記録する運用を開始する。

## ▼ 06/21（日）

### 食事総評（72/100）
- トレ日として合格、攻めの減量日としては及第点。守りは○、弱点は脂質。
- **タンパク質：約138〜148g / 150g**（アクアで底上げして死守、ほぼ達成）
- 脂質：推定70〜85gで目標超過寄り。カロリーも維持寄り＝今日は赤字が薄い日。
- 良かった配置：昼に糖質→トレ前クアン→トレ後アシッド→カロリミットを最大食に集中→トレ日禁酒。教科書通り。
- 次に活かす1点：揚げ物が重なる日は一品を非揚げのP源（冷奴/刺身/サラダチキン）に替えると脂質を抑えつつ食品Pが上がる。

### トレ総評（80/100）

<script>
  // ---- PIN gate (0000) ----
  var PIN="0000", KEY="frev_ok";
  function open_(){ document.getElementById('gate').style.display='none'; document.getElementById('app').style.display='block'; render(); }
  if(localStorage.getItem(KEY)==='1'){ open_(); }
  function tryOpen(){
    var v=document.getElementById('pin').value;
    if(v===PIN){ localStorage.setItem(KEY,'1'); open_(); }
    else{ document.getElementById('gateErr').textContent='PINが違います'; }
  }
  document.getElementById('gateBtn').addEventListener('click', tryOpen);
  document.getElementById('pin').addEventListener('keydown', function(e){ if(e.key==='Enter') tryOpen(); });

  // ---- minimal markdown renderer (subset: h1-3, ul(-), strong**, hr---, p) ----
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){ return esc(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); }
  function render(){
    var src=document.getElementById('src-review').textContent.replace(/^\n/,'');
    var lines=src.split('\n'), out=[], inUl=false;
    function closeUl(){ if(inUl){ out.push('</ul>'); inUl=false; } }
    for(var i=0;i<lines.length;i++){
      var ln=lines[i].replace(/\s+$/,'');
      if(/^### /.test(ln)){ closeUl(); out.push('<h3>'+inline(ln.slice(4))+'</h3>'); }
      else if(/^## /.test(ln)){ closeUl(); out.push('<h2>'+inline(ln.slice(3))+'</h2>'); }
      else if(/^# /.test(ln)){ closeUl(); out.push('<h1>'+inline(ln.slice(2))+'</h1>'); }
      else if(/^---\s*$/.test(ln)){ closeUl(); out.push('<hr>'); }
      else if(/^- /.test(ln)){ if(!inUl){ out.push('<ul>'); inUl=true; } out.push('<li>'+inline(ln.slice(2))+'</li>'); }
      else if(ln===''){ closeUl(); }
      else { closeUl(); out.push('<p>'+inline(ln)+'</p>'); }
    }
    closeUl();
    document.getElementById('content').innerHTML=out.join('\n');
  }
</script>
